<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concierge Virtual</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <header class="dashboard-header">
      <div class="brand">
        <img src="MythicSanaHotelLogoCor.png" alt="Sana Mythic Hotel" class="brand-logo-img">
        <h1>Portal Front Office</h1>
      </div>
      <div class="header-controls">
        <!-- Left Group: DateTime + Weather Forecast -->
        <div class="header-left-group">
          <div class="header-datetime">
            <span id="current-date-time"></span>
          </div>
          <div class="header-weather">
            <span id="weather-summary" class="weather-text">A carregar previsão...</span>
          </div>
        </div>

        <div class="header-divider"></div>

        <!-- Right Group: Profile + Duty Manager -->
        <div class="header-right-group">
          <div class="header-profile">
            <span id="user-profile-email" class="profile-email">A carregar perfil...</span>
            <button class="logout-button-styled" id="logout-button" aria-label="Sair">Sair</button>
          </div>
          <div class="duty-manager-card">
            <span class="duty-manager-label">Duty Manager:</span>
            <span class="duty-manager-value">Tarde / Noite</span>
          </div>
        </div>

        <!-- Compatibility fallbacks for JS logic -->
        <span id="greeting-text" style="display: none;"></span>
        <span id="header-date" style="display: none;"></span>
      </div>
    </header>

    <aside class="dashboard-sidebar">
      <nav>
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="concierge.html" class="active">Concierge Virtual</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">🌙</button>
      </div>
    </aside>

    <main class="dashboard-main">
      <section class="dashboard-grid">
        <div class="card" id="guias-section">
          <h2>Pesquisar Guias</h2>
          <input type="text" id="search-guias" placeholder="Pesquisar restaurantes, locais..." style="width: 100%; margin-bottom: 1rem; padding: 0.5rem; box-sizing: border-box;">
          <div id="guias-container" class="content-container">
            <p class="loading">A carregar guias...</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="js/concierge.js"></script>
</body>
</html>
