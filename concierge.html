<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concierge Virtual</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">
    <header class="dashboard-header">
      <div class="brand">
        <img src="MythicSanaHotelLogoCor.png" alt="Sana Mythic Hotel" class="brand-logo-img">
        <h1 data-i18n="header_title">Portal Front Office</h1>
      </div>
      <div class="header-controls">
        <!-- Left Group: DateTime + Weather Forecast -->
        <div class="header-left-group">
          <div class="header-datetime">
            <span id="current-date-time"></span>
          </div>
          <div class="header-weather">
            <span id="weather-summary" class="weather-text" data-i18n="weather_loading">A carregar previsão...</span>
          </div>
        </div>

        <div class="header-divider"></div>

        <!-- Right Group: Profile + Duty Manager -->
        <div class="header-right-group">
          <div class="header-profile">
            <span id="user-profile-email" class="profile-email">A carregar perfil...</span>
            <button class="logout-button-styled" id="logout-button" aria-label="Sair" data-i18n="logout_btn">Sair</button>
          </div>
          <div class="duty-manager-card">
            <span class="duty-manager-label" data-i18n="duty_manager">Duty Manager:</span>
            <span class="duty-manager-value" data-i18n="duty_manager_value">Tarde / Noite</span>
          </div>
        </div>

        <!-- Compatibility fallbacks for JS logic -->
        <span id="greeting-text" style="display: none;"></span>
        <span id="header-date" style="display: none;"></span>
      </div>
    </header>

    <aside class="dashboard-sidebar">
      <nav>
        <ul>
          <li><a href="index.html" id="nav-dashboard" data-i18n="nav_dashboard">Dashboard</a></li>
          <li><a href="concierge.html" class="active" id="nav-concierge" data-i18n="nav_concierge">Concierge Virtual</a></li>
          <li class="sidebar-dropdown-container">
            <button class="sidebar-dropdown-btn" id="nav-rececao-btn" aria-haspopup="true" aria-expanded="false">
              <span data-i18n="nav_rececao">Receção</span>
              <span class="dropdown-arrow">▼</span>
            </button>
            <ul class="sidebar-dropdown-menu" id="rececao-menu">
              <li><a href="checklist.html" id="nav-checklist" data-i18n="nav_checklist">Checklist de Turno</a></li>
              <li><a href="caixa.html" id="nav-caixa" data-i18n="nav_caixa">Contagem de Caixa</a></li>
            </ul>
          </li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <div class="footer-controls">
          <button class="lang-toggle-btn" id="lang-toggle" aria-label="Alterar idioma">PT / EN</button>
          <button class="theme-toggle" id="theme-toggle" aria-label="Alternar tema">🌙</button>
        </div>
      </div>
    </aside>

    <main class="dashboard-main">
      <section class="dashboard-grid">
        <div class="card" id="guias-section">
          <h2 data-i18n="nav_concierge">Concierge Virtual</h2>
          <input type="text" id="search-guias" placeholder="Pesquisar restaurantes, locais..." data-i18n="concierge_search_placeholder" class="form-input" style="width: 100%; margin-top: 10px; margin-bottom: 20px;">
          <div id="guias-container" class="content-container">
            <p class="loading" data-i18n="weather_loading">A carregar guias...</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="js/concierge.js"></script>
</body>
</html>
