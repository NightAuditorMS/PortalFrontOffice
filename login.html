<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Portal Front Office</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card card">
      <div class="login-header">
        <h1>Entrar no Portal</h1>
        <p>Introduza o seu email para receber um link de acesso mágico.</p>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <div class="input-group">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" placeholder="seu.email@exemplo.com" required>
        </div>

        <button type="submit" class="primary-btn">Enviar Link de Acesso</button>

        <div id="login-message" class="error-message" aria-live="polite"></div>
      </form>

      <p class="login-note">Protegido por Firebase Authentication com Email Link (Passwordless).</p>
    </section>
  </main>

  <script type="module">
    import { initializeAuth, sendMagicLink } from './js/auth.js';

    const form = document.getElementById('login-form');
    const messageEl = document.getElementById('login-message');

    async function showMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.style.color = isError ? '#ff7777' : '#b8b8b';
    }

    window.addEventListener('DOMContentLoaded', async () => {
      try {
        await initializeAuth();
      } catch (error) {
        showMessage(error.message, true);
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      messageEl.textContent = '';

      const email = document.getElementById('login-email').value.trim();

      try {
        await sendMagicLink(email);
        showMessage('Link de acesso enviado. Verifique a sua caixa de entrada.');
      } catch (error) {
        showMessage(error.message || 'Erro ao enviar o link. Tente novamente.', true);
      }
    });
  </script>
</body>
</html>
